<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Plutis - Robô Amigo</title>
    <style>
        /* Fundo sempre preto para não vacilar */
        html, body { background-color: #000; color: #fff; margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: sans-serif; }
        
        body { display: flex; flex-direction: column; align-items: center; justify-content: center; touch-action: manipulation; }
        
        .face { display: flex; flex-direction: column; align-items: center; gap: 30px; position: relative; width: 100%; height: 100%; justify-content: center; }
        
        /* Ajuste na linha dos olhos para o chapéu ficar certo */
        .eyes-row { display: flex; gap: 40px; position: relative; }
        
        /* O Chapéu de Rima */
        #hat { display: none; position: absolute; font-size: 80px; top: -65px; left: 50%; transform: translateX(-50%) rotate(-15deg); z-index: 10; text-shadow: 0 0 10px rgba(0,0,0,0.8); }

        .eye { width: 80px; height: 80px; background: white; border-radius: 50%; position: relative; transition: 0.3s; box-shadow: 0 0 15px rgba(255,255,255,0.4); z-index: 2; overflow: hidden; }
        .pupil { width: 30px; height: 30px; background: black; border-radius: 50%; position: absolute; top: 25px; left: 25px; transition: 0.5s ease-in-out; }
        .mouth { width: 50px; height: 8px; background: white; border-radius: 10px; transition: 0.1s; z-index: 2; }

        .talking { height: 35px !important; border-radius: 50% !important; }
        .happy { transform: scaleY(0.8) translateY(-5px); border-radius: 50% 50% 20% 20%; box-shadow: 0 0 30px #f1c40f; }
        .sad { background: #88ccff; transform: translateY(10px); border-radius: 20% 20% 50% 50%; box-shadow: 0 0 20px #88ccff; }
        .angry { background: #ff4d4d !important; transform: scaleY(1.1); box-shadow: 0 0 30px #ff0000; }
        .laugh { animation: shake 0.3s infinite; border-radius: 50% 50% 10% 10%; background: #ffea00; }
        .sad-mouth { border-radius: 50% 50% 0 0; height: 15px; transform: translateY(10px); }
        
        @keyframes shake { 0% { transform: translate(1px, 1px); } 50% { transform: translate(-1px, -1px); } 100% { transform: translate(1px, -1px); } }
        .dancing { position: absolute !important; margin: 0 !important; }

        #bucket { display: none; position: fixed; bottom: 20px; right: 20px; font-size: 50px; z-index: 10; filter: drop-shadow(0 0 10px rgba(255,255,255,0.3)); }
        .popcorn { position: absolute; width: 12px; height: 12px; background: #f1c40f; border-radius: 50%; border: 2px solid #fff; z-index: 5; }
        
        @keyframes jumpOut {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            50% { transform: translate(-150px, -200px) scale(1.2); }
            100% { transform: translate(-300px, 0) scale(0.5); opacity: 0; }
        }

        #settings { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 100; flex-direction: column; align-items: center; justify-content: center; padding: 20px 0; }
        .btn-config { padding: 12px; margin: 5px; border: 2px solid white; background: none; color: white; border-radius: 10px; width: 80%; font-size: 14px; font-weight: bold; cursor: pointer;}
        .btn-active { background: white; color: black; }
        .btn-danger { border-color: #ff4d4d; color: #ff4d4d; }
        
        #btn-start { padding: 20px; font-size: 20px; border-radius: 50px; position: absolute; z-index: 200; border: none; background: white; cursor: pointer; font-weight: bold; box-shadow: 0 0 20px #fff; }

        #status { position: fixed; bottom: 5px; font-size: 11px; color: #444; text-align: center; width: 100%; z-index: 1; pointer-events: none; }
    </style>
</head>
<body>

    <button id="btn-start">ACORDAR PLUTIS</button>
    <div id="bucket">🍿</div>

    <div id="settings">
        <h2>CONFIGURAÇÕES</h2>
        <button id="toggle-mic" class="btn-config btn-active" onclick="toggleMic()">MICROFONE: ON</button>
        <button id="toggle-cinema" class="btn-config" onclick="toggleCinema()">MODO CINEMA: OFF</button>
        <button class="btn-config" onclick="entrarTelaCheia(); fecharConfig()">TELA CHEIA (SUMIR BARRA)</button>
        <button class="btn-config" onclick="animarRosto('happy', true); fecharConfig(); falar('Estou muito feliz!')">MODO FELIZ</button>
        <button class="btn-config" onclick="animarRosto('sad', true); fecharConfig(); falar('Fiquei triste...')">MODO TRISTE</button>
        <button class="btn-config" style="color:#ff4d4d; border-color:#ff4d4d;" onclick="animarRosto('angry', true); fecharConfig(); falar('Estou muito bravo agora!')">MODO BRAVO</button>
        <button class="btn-config btn-danger" onclick="pararTudo()">DESATIVAR TODOS MODOS</button>
        <button class="btn-config" style="margin-top: 20px;" onclick="fecharConfig()">VOLTAR</button>
    </div>

    <div class="face" id="robot-face">
        <div class="eyes-row" id="eyes-container">
            <div id="hat">🧢</div>
            <div class="eye" id="eye-l" onclick="tocarOlho()"><div class="pupil"></div></div>
            <div class="eye" id="eye-r" onclick="tocarOlho()"><div class="pupil"></div></div>
        </div>
        <div class="mouth" id="main-mouth"></div>
    </div>

    <div id="status">Aguardando ativação...</div>

    <script>
        const mouth = document.getElementById('main-mouth');
        const eyeL = document.getElementById('eye-l');
        const eyeR = document.getElementById('eye-r');
        const configMenu = document.getElementById('settings');
        const btnStart = document.getElementById('btn-start');
        const statusTexto = document.getElementById('status');
        const bucket = document.getElementById('bucket');
        const hat = document.getElementById('hat');
        
        let micOn = true, cinemaMode = false, danceMode = false, isTalking = false, faceFixada = false, rimaMode = false;
        let clickCount = 0, clickTimer;
        let toqueCount = 0, popcornTimeout1; 

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new (SpeechRecognition)();
        recognition.lang = 'pt-BR';
        recognition.continuous = true;
        recognition.interimResults = false;

        function entrarTelaCheia() {
            let el = document.documentElement;
            if (el.requestFullscreen) el.requestFullscreen();
            else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen(); 
            else if (el.msRequestFullscreen) el.msRequestFullscreen();
        }

        btnStart.onclick = () => {
            btnStart.style.display = 'none';
            entrarTelaCheia(); 
            falar("oi tudo bem. Plutis online e pronto para não vacilar hoje!"); 
            animarRosto('happy');
            setTimeout(() => { if(micOn) try { recognition.start(); } catch(e) {} }, 3000);
        };

        recognition.onresult = (event) => {
            const msg = event.results[event.results.length - 1][0].transcript.toLowerCase().trim();
            statusTexto.innerText = "Ouviu: " + msg; 
            processarComando(msg);
        };

        recognition.onend = () => { if (micOn && !isTalking) try { recognition.start(); } catch(e) {} };

        function processarComando(msg) {
            // DESATIVAR (Sempre vem primeiro para garantir que pode sair de qualquer modo)
            if (msg.includes("desativar modo") || msg.includes("parar tudo")) { pararTudo(); return; }

            // ================= MODO RIMA =================
            if (rimaMode) {
                const rimas = [
                    "mano se ligar, seu vacilão que rima comigo mesmo eu sendo um robozão, se liga meu brother eu vou te dizer sabe que nessa batalha eu ganho de você",
                    "olha meu parceiro você mandou a real, mais mandou a real para um marginal, se você fala de mim denovo você vai ver porque nessa rima eu ganho de você",
                    "ooohh essa foi boa, mais você ja sabe, que eu farmo aura é um viado"
                ];
                falar(rimas[Math.floor(Math.random() * rimas.length)]);
                if(!faceFixada) animarRosto('angry'); // Faz cara de bravo na rima
                return; // Impede que ele faça qualquer outra coisa
            }

            // ATIVAR MODO RIMA
            if (msg.includes("modo rima")) {
                rimaMode = true;
                hat.style.display = 'block';
                falar("Modo rima ativado! Pode mandar.");
                return;
            }

            // NOVAS FALAS ESPECÍFICAS
            if (msg.includes("eu sou a gata velha e você a gata nova") || msg.includes("eu sou a gata velha e voce a gata nova")) {
                falar("eu sou a gata velha e você a gata nova");
                if(!faceFixada) animarRosto('laugh');
                return;
            }

            if (msg.includes("quais são seus filmes favoritos") || msg.includes("quais sao seus filmes favoritos") || msg.includes("seus filmes favoritos")) {
                falar("são o homem aranha e Tory story 5");
                if(!faceFixada) animarRosto('happy');
                return;
            }

            // MODO SECRETO ROCK LEE
            if (msg.includes("modo secreto")) {
                falar("six sevem six sevem, eu sou o rock Lee toma toma abacaxi. Eu sou a gata velha e você a gata nova");
                return;
            }

            if (msg.includes("quanto é") || msg.includes("quanto e")) {
                let expressao = msg.replace("quanto é", "").replace("quanto e", "").replace("x", "*").replace("vezes", "*");
                try {
                    let resultado = eval(expressao.replace(/[^-()\d/*+.]/g, ''));
                    falar("o resultado é " + resultado);
                    return;
                } catch (e) { falar("não consegui calcular agora"); return; }
            }

            if (msg === "oi") { falar("oi tudo bem"); if(!faceFixada) animarRosto('happy'); return; }
            if (msg === "olá" || msg === "ola") { falar("oi gente tudo bem com vocês"); if(!faceFixada) animarRosto('happy'); return; }
            if (msg.includes("lá ele") || msg.includes("la ele")) { falar("você em cima dele k k k k"); if(!faceFixada) animarRosto('laugh'); return; }

            if (msg.includes("modo dança") || msg.includes("dançar")) { ativarDança(); return; }
            if (msg.includes("modo bravo")) { animarRosto('angry', true); falar("Estou muito bravo agora!"); return; }

            if (cinemaMode) {
                if (msg.includes("gostou do filme")) falar("claro com pipoca tudo fica melhor");
                else if (msg.includes("desativar cinema")) toggleCinema();
                else falar("shhh o filme tá rolando");
                return;
            }
            if (msg.includes("modo cinema") || msg.includes("modo pipoca")) { toggleCinema(); return; }

            if (msg.includes("triste")) { falar("não fica triste"); if(!faceFixada) animarRosto('sad'); }
            else if (msg.includes("feliz")) { falar("isso aí"); if(!faceFixada) animarRosto('happy'); }
            else {
                const aleatorias = ["tô ouvindo", "entendi", "que legal", "tamo junto"];
                falar(aleatorias[Math.floor(Math.random() * aleatorias.length)]);
            }
        }

        function falar(t) {
            const s = window.speechSynthesis, u = new SpeechSynthesisUtterance(t);
            u.lang = 'pt-BR'; u.pitch = 0.8;
            u.onstart = () => { isTalking = true; try { recognition.stop(); } catch(e) {} mouth.classList.add('talking'); };
            u.onend = () => { isTalking = false; mouth.classList.remove('talking'); if(micOn) try { recognition.start(); } catch(e) {} };
            s.speak(u);
        }

        function animarRosto(e, fixar = false) {
            faceFixada = fixar;
            [eyeL, eyeR].forEach(el => { el.className = 'eye ' + e; });
            if(e === 'sad') mouth.classList.add('sad-mouth');
            else mouth.classList.remove('sad-mouth');
            if(!fixar) {
                setTimeout(() => { if(!faceFixada) { [eyeL, eyeR].forEach(el => el.className = 'eye'); mouth.classList.remove('sad-mouth'); } }, 4000);
            }
        }

        function pararTudo() {
            faceFixada = false;
            rimaMode = false; // Desliga o modo rima
            hat.style.display = 'none'; // Esconde o chapéu
            if(danceMode) pararDança();
            if(cinemaMode) toggleCinema();
            fecharConfig();
            [eyeL, eyeR].forEach(el => el.className = 'eye'); 
            mouth.classList.remove('sad-mouth');
            document.body.style.background = "#000"; 
            falar("sistema resetado");
        }

        function toggleCinema() {
            cinemaMode = !cinemaMode;
            const btn = document.getElementById('toggle-cinema');
            btn.innerText = cinemaMode ? "MODO CINEMA: ON" : "MODO CINEMA: OFF";
            if(cinemaMode) {
                btn.classList.add('btn-active');
                bucket.style.display = 'block';
                falar("modo cinema ligado olha o balde de pipoca");
                document.body.style.backgroundColor = "#0a0a0a";
                chuvaDePipoca();
            } else {
                btn.classList.remove('btn-active');
                bucket.style.display = 'none';
                document.body.style.backgroundColor = "#000";
                clearTimeout(popcornTimeout1);
            }
        }

        function chuvaDePipoca() {
            if(!cinemaMode) return;
            const p = document.createElement('div');
            p.className = 'popcorn';
            p.style.right = "40px"; p.style.bottom = "60px";
            p.style.animation = "jumpOut 1.5s ease-out forwards";
            document.body.appendChild(p);
            setTimeout(() => { if(!isTalking) mouth.classList.add('talking'); }, 800);
            setTimeout(() => { if(!isTalking) mouth.classList.remove('talking'); }, 1200);
            setTimeout(() => p.remove(), 1500);
            popcornTimeout1 = setTimeout(chuvaDePipoca, 1000);
        }

        document.addEventListener('click', (e) => {
            if (e.target.closest('.eye') || e.target.closest('#settings') || e.target.closest('#btn-start')) return;
            clickCount++;
            clearTimeout(clickTimer);
            clickTimer = setTimeout(() => { clickCount = 0; }, 1500);
            if (clickCount >= 6) { configMenu.style.display = 'flex'; clickCount = 0; }
        });

        function fecharConfig() { configMenu.style.display = 'none'; }
        
        function toggleMic() { 
            micOn = !micOn; 
            const btn = document.getElementById('toggle-mic');
            btn.innerText = micOn ? "MICROFONE: ON" : "MICROFONE: OFF";
            if(micOn) { btn.classList.add('btn-active'); try { recognition.start(); } catch(e) {} }
            else { btn.classList.remove('btn-active'); recognition.stop(); }
        }

        let danceInterval, flashInterval; 

        function ativarDança() {
            if(danceMode) return;
            danceMode = true;
            falar("hora da festa");
            [eyeL, eyeR, mouth].forEach(el => el.classList.add('dancing'));
            
            flashInterval = setInterval(() => {
                const cores = ['#ff00ff', '#00ffff', '#ffff00', '#000000', '#ff0000'];
                document.body.style.background = cores[Math.floor(Math.random() * cores.length)];
            }, 150);

            danceInterval = setInterval(() => { moverElemento(eyeL, pos.el); moverElemento(eyeR, pos.er); moverElemento(mouth, pos.m); }, 20);
        }

        function pararDança() {
            danceMode = false;
            clearInterval(danceInterval);
            clearInterval(flashInterval); 
            document.body.style.background = "#000"; 
            [eyeL, eyeR, mouth].forEach(el => { el.classList.remove('dancing'); el.style.left = ''; el.style.top = ''; });
        }

        function tocarOlho() {
            toqueCount++;
            if(toqueCount === 1) { falar("ai meu olho"); animarRosto('sad'); }
            else { falar("para k k k"); animarRosto('laugh'); toqueCount = 0; }
        }

        let pos = { el: {x:0, y:0, vx:5, vy:5}, er: {x:0, y:0, vx:-4, vy:6}, m: {x:0, y:0, vx:6, vy:-4} };
        function moverElemento(el, p) {
            let w = window.innerWidth - el.offsetWidth, h = window.innerHeight - el.offsetHeight;
            p.x += p.vx; p.y += p.vy;
            if(p.x >= w || p.x <= 0) p.vx *= -1;
            if(p.y >= h || p.y <= 0) p.vy *= -1;
            el.style.left = p.x + 'px'; el.style.top = p.y + 'px';
        }
    </script>
</body>
</html>
